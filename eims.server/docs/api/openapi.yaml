  responses:
    BadRequest:
      description: 請求格式或欄位錯誤。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未通過 CAS SSO 或 session 過期。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: 內部錯誤。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

security:
  - casSso: []

paths:
  # =========================================================================
  # Main
  # =========================================================================
  /login:
    post:
      tags: [Main]
      operationId: login
      summary: 一般帳密登入。
      x-interceptor-excluded: true
      description: 排除於 `RequestInterceptor`（見 `CommonConfiguration.excludePathPatterns`）。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SessionInfo" }
      responses:
        "200":
          description: 登入結果，包含 session、user、perm list 與 menu tree。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginUserInfo" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/ServerError" }
  /eims/sso:
    get:
      tags: [Main]
      operationId: ssoEntry
      summary: CAS SSO 入口。
      responses:
        "200":
          description: 重新導向或 SSO ticket 驗證結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Generic" }
  /changelang:
    get:
      tags: [Main]
      operationId: changeLang
      summary: 切換使用者語系。
      parameters:
        - in: query
          name: lang
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Generic" }
  /logininfosso:
    get:
      tags: [Main]
      operationId: getLoginInfoSso
      summary: 取得 SSO 登入資訊。
      responses:
        "200":
          description: SSO 登入後使用者資訊。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginUserInfo" }
  /bxmlogin:
    get:
      tags: [Main]
      operationId: bxmLogin
      summary: BXM 登入入口。
      x-interceptor-excluded: true
      description: 排除於 `RequestInterceptor`。
      security: []
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Generic" }
  /userInfo:
    get:
      tags: [Main]
      operationId: getUserInfo
      summary: 取得目前登入使用者資訊。
      responses:
        "200":
          description: 使用者資訊。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserInfo" }
  /logout:
    post:
      tags: [Main]
      operationId: logout
      summary: 登出。
      x-interceptor-excluded: true
      description: 排除於 `RequestInterceptor`。
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonResponse" }

  # =========================================================================
  # Menu
  # =========================================================================
  /menus:
    get:
      tags: [Menu]
      operationId: listMenus
      summary: 取得選單清單。
      x-interceptor-excluded: true
      description: 排除於 `RequestInterceptor`。
      responses:
        "200":
          description: 選單清單。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UiMenuOut" }
    post:
      tags: [Menu]
      operationId: createMenu
      summary: 新增選單。
      x-interceptor-excluded: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MenuDto" }
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonResponse" }
    put:
      tags: [Menu]
      operationId: updateMenu
      summary: 修改選單。
      x-interceptor-excluded: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MenuDto" }
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonResponse" }
  /menus/{menuId}:
    parameters:
      - in: path
        name: menuId
        required: true
        schema: { type: string }
    get:
      tags: [Menu]
      operationId: getMenu
      summary: 取單筆選單。
      responses:
        "200":
          description: 選單。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MenuDto" }
    delete:
      tags: [Menu]
      operationId: deleteMenu
      summary: 刪除選單。
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonResponse" }

  # =========================================================================
  # Role
  # =========================================================================
  /roles:
    get:
      tags: [Role]
      operationId: listRoles
      summary: 角色清單。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/UiRoleOut" } }
    post:
      tags: [Role]
      operationId: createRole
      summary: 新增角色。
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/RoleDto" } }
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
    put:
      tags: [Role]
      operationId: updateRole
      summary: 修改角色。
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/RoleDto" } }
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: getRole
      summary: 取單筆角色。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/RoleDto" } }
    delete:
      tags: [Role]
      operationId: deleteRole
      summary: 刪除角色。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}/menus:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: listRoleMenus
      summary: 角色對應之選單清單。
      responses:
        "200":
          description: 結果（menu tree）。
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UiMenuTreeInfo" }
    put:
      tags: [Role]
      operationId: updateRoleMenus
      summary: 設定角色之選單清單。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/MenuRoleRelDto" }
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}/menupopups:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: listRoleMenuPopups
      summary: popup 用之選單清單。
      responses:
        "200":
          description: 結果（menu tree popup 視圖）。
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UiMenuTreeInfo" }
  /roles/{roleId}/menus/{menuId}:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
      - in: path
        name: menuId
        required: true
        schema: { type: string }
    delete:
      tags: [Role]
      operationId: removeRoleMenu
      summary: 移除角色之單一選單。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}/perms:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: listRolePerms
      summary: 角色對應之權限清單。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/UiPermOut" } }
    put:
      tags: [Role]
      operationId: updateRolePerms
      summary: 設定角色之權限清單。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/RolePermRelDto" }
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}/permpopups:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: listRolePermPopups
      summary: popup 用之權限清單。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/UiPermOut" } }
  /roles/{roleId}/perms/{permId}:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
      - in: path
        name: permId
        required: true
        schema: { type: string }
    delete:
      tags: [Role]
      operationId: removeRolePerm
      summary: 移除角色之單一權限。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }

  # =========================================================================
  # Perm
  # =========================================================================
  /perms:
    get:
      tags: [Perm]
      operationId: listPerms
      summary: 權限清單。
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/UiPermOut" } } } }
    post:
      tags: [Perm]
      operationId: createPerm
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PermDto" } } } }
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } } } }
    put:
      tags: [Perm]
      operationId: updatePerm
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PermDto" } } } }
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } } } }
  /perms/{permId}:
    parameters: [{ in: path, name: permId, required: true, schema: { type: string } }]
    get:
      tags: [Perm]
