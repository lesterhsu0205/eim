openapi: 3.0.3
info:
  title: EIMS Server REST API
  version: "1.0.0"
  description: |
    自 `eims.web.controller` 套件中所有 `@RequestMapping` / `@GetMapping` /
    `@PostMapping` / `@PutMapping` / `@DeleteMapping` 註解掃描而得之 REST API 規格。

    認證：除 `x-interceptor-excluded: true` 之 operation 外，皆需先通過 CAS SSO 與
    `RequestInterceptor`（見 `eims.config.CommonConfiguration`）。

    反序列化：全域 `CustomObjectMapper` 啟用 `FAIL_ON_UNKNOWN_PROPERTIES = true`，
    呼叫端必須只送 DTO 已宣告之欄位。

servers:
  - url: http://localhost:9100/eims
    description: 本機 Tomcat 開發環境（context path `/eims`、port `9100`）。
  - url: https://{host}/eims
    description: WAS 部署環境（JNDI `java:/EIMSNXA`）。
    variables:
      host:
        default: eims.example.com

tags:
  - name: Main
    description: 登入、登出、SSO、使用者資訊、語系切換。
  - name: Menu
    description: 選單 CRUD。
  - name: Role
    description: 角色 CRUD 與 menu/perm 關聯。
  - name: Perm
    description: 權限 CRUD。
  - name: User
    description: 使用者 CRUD。
  - name: App
    description: 應用程式 CRUD。
  - name: Biz
    description: 業務代碼 CRUD。
  - name: CommCode
    description: 共用代碼 CRUD 與查詢。
  - name: Enc
    description: 加密代碼。
  - name: Mask
    description: 遮罩代碼。
  - name: Trx
    description: 交易 CRUD。
  - name: Srsys
    description: 來源系統 CRUD。
  - name: Depolysys
    description: 部署系統 CRUD 與條件查詢。
  - name: Extrnlinst
    description: 外部機構 CRUD。
  - name: Mappingfunc
    description: Mapping 函式 CRUD。
  - name: Meta
    description: Meta CRUD、影響分析、同步。
  - name: Msglayout
    description: 訊息版面 CRUD、暫存、Excel 匯出、檔案上傳、外部訊息、msgId 產生。
  - name: Intrfccom
    description: 介面 CRUD、部署 / 重新部署 / 部署歷程、檔案上傳 / 匯入 / 匯出、layoutdiff、terminal、intrfcId 產生。
  - name: Actionhist
    description: 操作歷程查詢與新增。

components:
  securitySchemes:
    casSso:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: |
        CAS Single Sign-On。實作於 `eims.config.SSOFilterConfig`，由 `cas-client-core`
        與 `cas-client-support-saml` 提供（`lib/` 內離線 JAR）。Session 以 JSESSIONID
        cookie 維持。標註 `x-interceptor-excluded: true` 之 operation 不走
        `RequestInterceptor`，但可能仍受 SSO Filter 覆蓋——依 `CommonConfiguration`
        excludePathPatterns 為準。

  schemas:
    ErrorResponse:
      type: object
      description: 對應 `eims.web.dto.ui.ErrorResponse`。
      properties:
        responseStatus:
          type: string
        message:
          type: string
        parameters:
          type: array
          items: { type: string }
        stackTrace:
          type: string
    CommonResponse:
      type: object
      description: 對應 `eims.web.dto.CommonResponse`。一般成功/失敗回應；與 `ErrorResponse` 結構不同。
      properties:
        hasError:
          type: boolean
        errorMsg:
          type: string
    Generic:
      type: object
      description: |
        泛型佔位 schema。本批次（main-auth）涵蓋之 DTO 已展開；尚未展開之 endpoint
        後續 `flesh-out-schemas-data` / `flesh-out-schemas-intrfc` change 補完。
      additionalProperties: true

    # ========================================================================
    # main-auth 批次：共用 dto
    # ========================================================================
    SessionInfo:
      type: object
      description: 對應 `eims.web.dto.SessionInfo`。
      properties:
        userId: { type: string }
        userPassword: { type: string, format: password }
        locale: { type: string }
        check:
          type: string
          description: 預設 `Y`。
    UserInfo:
      type: object
      description: 對應 `eims.web.dto.UserInfo`。
      properties:
        userId: { type: string }
        roleId: { type: string }
        locale: { type: string }
        type: { type: string }
    LoginUserInfo:
      type: object
      description: 對應 `eims.web.dto.LoginUserInfo`。包含 session、user、perm、menu 樹。
      properties:
        sessionInfo:
          $ref: "#/components/schemas/SessionInfo"
        userDto:
          $ref: "#/components/schemas/UserDto"
        permList:
          type: array
          items: { $ref: "#/components/schemas/PermDto" }
        menuList:
          type: array
          items: { $ref: "#/components/schemas/UiMenuTreeInfo" }

    # ========================================================================
    # main-auth 批次：dto.table
    # ========================================================================
    MenuDto:
      type: object
      description: 對應 `eims.web.dto.table.MenuDto`。Jackson `NON_ABSENT` + `NON_EMPTY` + `ignoreUnknown=true`。
      properties:
        menuId: { type: string, description: 選單 ID }
        menuNm: { type: string, description: 選單名稱 }
        menuDesc: { type: string, description: 選單說明 }
        menuSeq: { type: integer, format: int32, description: 順序 }
        parentMenuId: { type: string, description: 上層選單 ID }
    RoleDto:
      type: object
      description: 對應 `eims.web.dto.table.RoleDto`。
      properties:
        roleId: { type: string, description: 角色 ID }
        roleNm: { type: string, description: 角色名稱 }
        roleDesc: { type: string, description: 角色說明 }
        basicMenuId: { type: string, description: 預設選單 ID }
    PermDto:
      type: object
      description: 對應 `eims.web.dto.table.PermDto`。
      properties:
        permId: { type: string, description: 權限 ID }
        permNm: { type: string, description: 權限名稱 }
        permDesc: { type: string, description: 權限說明 }
        permTypeCd: { type: string, description: 權限類別代碼 }
        check: { type: boolean, description: 勾選狀態（popup 用） }
    UserDto:
      type: object
      description: 對應 `eims.web.dto.table.UserDto`。
      properties:
        userId: { type: string, description: 使用者 ID }
        userNm: { type: string, description: 使用者名稱 }
        userPwd: { type: string, format: password, description: 使用者密碼 }
        dutyNm: { type: string, description: 職稱 }
        deptNm: { type: string, description: 部門 }
        email: { type: string, format: email }
        roleId: { type: string, description: 角色 ID }
    AppcdDto:
      type: object
      description: 對應 `eims.web.dto.table.AppcdDto`。
      properties:
        appCd: { type: string }
        appCdNm: { type: string }
        parentAppCd: { type: string }
        lvCd: { type: string }
        alignOrderNo: { type: integer, format: int32 }
        appCdDesc: { type: string }
        appUnqKey: { type: string }
    BizcdDto:
      type: object
      description: 對應 `eims.web.dto.table.BizcdDto`。
      properties:
        bizCd: { type: string }
        bizCdNm: { type: string }
        bizCdDesc: { type: string }
    MenuRoleRelDto:
      type: object
      description: 對應 `eims.web.dto.table.MenuRoleRelDto`。
      properties:
        menuId: { type: string }
        roleId: { type: string }
        permId: { type: string }
    RolePermRelDto:
      type: object
      description: 對應 `eims.web.dto.table.RolePermRelDto`。
      properties:
        roleId: { type: string }
        permId: { type: string }
    ChangePwdInfo:
      type: object
      description: 對應 `eims.web.dto.table.ChangePwdInfo`。`sysCd` 序列化為 `tenantId`。
      properties:
        tenantId:
          type: string
          description: 序列化來源 `sysCd`（透過 `@JsonProperty("tenantId")`）。
        userId: { type: string }
        userPwd: { type: string, format: password }
        changePwd: { type: string, format: password }
        updateUserId: { type: string }
        updateAppId: { type: string }

    # ========================================================================
    # main-auth 批次：dto.ui
    # ========================================================================
    UiMenuOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiMenuOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        menuOutList:
          type: array
          items: { $ref: "#/components/schemas/MenuDto" }
    UiMenuTreeInfo:
      type: object
      description: 對應 `eims.web.dto.ui.UiMenuTreeInfo`。樹狀結構節點，由 controller 端組裝。
      properties:
        id: { type: string }
        parentId: { type: string }
        name: { type: string }
        seq: { type: integer, format: int32 }
        description: { type: string }
        check: { type: boolean }
        permId: { type: string }
    UiRoleOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiRoleOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        roleDtoList:
          type: array
          items: { $ref: "#/components/schemas/RoleDto" }
    UiPermOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiPermOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        permDtoList:
          type: array
          items: { $ref: "#/components/schemas/PermDto" }
    UiUserOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiUserOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        userOutList:
          type: array
          items: { $ref: "#/components/schemas/UserDto" }
    UiAppcdOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiAppcdOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        appcdOutList:
          type: array
          items: { $ref: "#/components/schemas/AppcdDto" }
    UiBizcdOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiBizcdOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        bizcdOutList:
          type: array
          items: { $ref: "#/components/schemas/BizcdDto" }

    # ========================================================================
    # data 批次：dto.table
    # ========================================================================
    CommCodeDto:
      type: object
      description: 對應 `eims.web.dto.table.CommCodeDto`。Jackson `NON_ABSENT` + `NON_EMPTY` + `ignoreUnknown=true`。
      properties:
        cdId: { type: string, description: 代碼 ID }
        cdVal: { type: string, description: 代碼值 }
        langCd: { type: string, description: 語言代碼 }
        cdNm: { type: string, description: 代碼名稱 }
        cdValNm: { type: string, description: 代碼值名稱 }
        cdSeq: { type: integer, format: int32, description: 序號 }
        cdDesc: { type: string, description: 代碼說明 }
    CodeInterfaceDto:
      type: object
      description: 對應 `eims.web.dto.table.CodeInterfaceDto`。代碼介接資料。
      properties:
        ifDataSeq: { type: integer, format: int32 }
        ifDataCrtTmstmp: { type: string }
        ifDataAplyTpCd: { type: string }
        ifDataAplyStsCd: { type: string }
        ifDataAplyTmstmp: { type: string }
        ifDataAplyErrCd: { type: string }
        ifDataAplyErrMsg: { type: string }
        dmnLgclNm: { type: string }
        dmnPsclNm: { type: string }
        dmnCdVal: { type: string }
        dmnCdValGlbl: { type: string }
        stdTrmDataScl: { type: string }
    EnccdDto:
      type: object
      description: 對應 `eims.web.dto.table.EnccdDto`。加密代碼。
      properties:
        encCd: { type: string, description: 加密代碼 }
        encNm: { type: string, description: 加密名稱 }
    MaskcdDto:
      type: object
      description: 對應 `eims.web.dto.table.MaskcdDto`。遮罩代碼。
      properties:
        maskCd: { type: string, description: 遮罩代碼 }
        maskNm: { type: string, description: 遮罩名稱 }
    FieldEncodingDto:
      type: object
      description: |
        對應 `eims.web.dto.table.FieldEncodingDto`。欄位編碼明細項。
        為 `IntrfcMsgFieldEncodingDto`（intrfc 批次）之 list 元素；本身為獨立 DTO，兩者非重複（不合併）。
      properties:
        seq: { type: integer, format: int32, description: 欄位序號 }
        fldEngNm: { type: string, description: 欄位英文名 }
        fldUnqId: { type: string, description: 欄位唯一 ID }
        fldEncoding: { type: string, description: 欄位編碼 }
        wideHalfCharCngCd: { type: string, description: 全半形轉換代碼 }
    TrxcdDto:
      type: object
      description: 對應 `eims.web.dto.table.TrxcdDto`。
      properties:
        trxCd: { type: string, description: 交易代碼 }
        trxCdNm: { type: string, description: 交易代碼名稱 }
        mngSysCd: { type: string, description: 管理系統代碼（COO/COB 等） }
        trxCdDesc: { type: string, description: 交易代碼說明 }
    SrsysbsDto:
      type: object
      description: 對應 `eims.web.dto.table.SrsysbsDto`。送收系統。
      properties:
        sysCd: { type: string, description: 系統代碼 }
        sysNm: { type: string, description: 系統名稱 }
        sysCdDesc: { type: string, description: 系統代碼說明 }
        crgManNm: { type: string, description: 負責人 }
        noncoreYn: { type: string, description: 非核心系統 Y/N }
    DepolysysbsDto:
      type: object
      description: 對應 `eims.web.dto.table.DepolysysbsDto`。部署系統。
      properties:
        deploySysCd: { type: string, description: 部署系統代碼 }
        deploySysNm: { type: string, description: 部署系統名稱 }
        deploySysUrl: { type: string, description: 部署系統 URL }
        deploySysDesc: { type: string, description: 部署系統說明 }
        deploySysGrpCd: { type: string, description: 部署系統群組代碼 }
    ExtrnlinstcdDto:
      type: object
      description: 對應 `eims.web.dto.table.ExtrnlinstcdDto`。外部機構代碼。
      properties:
        instCd: { type: string, description: 機構代碼 }
        instCdNm: { type: string, description: 機構代碼名稱 }
        instDstnctnVal: { type: string, description: 機構判別值 }
        instCdDesc: { type: string, description: 機構代碼說明 }
    MappingfuncbsDto:
      type: object
      description: 對應 `eims.web.dto.table.MappingfuncbsDto`。對應函式。
      properties:
        mappingFuncNm: { type: string, description: 對應函式名稱 }
        argsCnt: { type: integer, format: int32, description: 參數個數 }
        guideDesc: { type: string, description: 使用說明 }
    MetabsDto:
      type: object
      description: 對應 `eims.web.dto.table.MetabsDto`。Meta 標準項目。
      properties:
        metaEngNm: { type: string, description: Meta 英文名 }
        metaKorNm: { type: string, description: Meta 韓文名 }
        metaLen: { type: integer, format: int32, description: 長度 }
        decimalLen: { type: integer, format: int32, description: 小數長度 }
        dataTypeNm: { type: string, description: 資料型別名 }
        metaEncYn: { type: string, description: 加密 Y/N }
        metaTermType: { type: string, description: 術語類型 }
    BcMetaDto:
      type: object
      description: 對應 `eims.web.dto.table.BcMetaDto`。（資料來源：JNDI / spring.meta.datasource.*）
      properties:
        stdAreaNm: { type: string, description: 標準領域名 }
        dicPhyNm: { type: string, description: 字典物理名 }
        dicLogNm: { type: string, description: 字典邏輯名 }
        dataTypeNm: { type: string, description: 資料型別名 }
        dataTypeCd: { type: string, description: 資料型別代碼 }
        dataLen: { type: integer, format: int32, description: 資料長度 }
        dataScale: { type: integer, format: int32, description: 小數位數 }
        dicDesc: { type: string, description: 字典說明 }
    BcMetaAppCdDto:
      type: object
      description: 對應 `eims.web.dto.table.BcMetaAppCdDto`。（資料來源：JNDI / spring.meta.datasource.*）
      properties:
        cdVal: { type: string }
        cdValNm: { type: string }
        pCdId: { type: string, description: 上層代碼 ID }
        pCdValId: { type: string, description: 上層代碼值 ID }
        cdValId: { type: string, description: 代碼值 ID }
    BcMetaSysCdDto:
      type: object
      description: 對應 `eims.web.dto.table.BcMetaSysCdDto`。（資料來源：JNDI / spring.meta.datasource.*）
      properties:
        cdVal: { type: string }
        cdValNm: { type: string }
        cdValDesc: { type: string }
    MetaEffectDto:
      type: object
      description: 對應 `eims.web.dto.table.MetaEffectDto`。Meta 變更影響（介面對應）。
      properties:
        metaEngNm: { type: string, description: Meta 英文名 }
        intrfcId: { type: string, description: 介面 ID }
        intrfcNm: { type: string, description: 介面名稱 }
        intrfcType: { type: string, description: 介面類型 }
        msgLayoutId: { type: string, description: 訊息版面 ID }
    MetaInterfaceDto:
      type: object
      description: 對應 `eims.web.dto.table.MetaInterfaceDto`。Meta 介接資料（標準術語）。
      properties:
        ifDataSeq: { type: integer, format: int32 }
        ifDataCrtTmstmp: { type: string }
        ifDataAplyTpCd: { type: string }
        ifDataAplyStsCd: { type: string }
        ifDataAplyTmstmp: { type: string }
        ifDataAplyErrCd: { type: string }
        ifDataAplyErrMsg: { type: string }
        stdTrmTpCd: { type: string }
        stdTrmLgclNm: { type: string }
        stdTrmPsclNm: { type: string }
        stdTrmDataTpNm: { type: string }
        stdTrmDataLen: { type: integer, format: int32 }
        stdTrmDataScl: { type: integer, format: int32 }
        stdTrmDmnEncYn: { type: string }
    ActionhisthsDto:
      type: object
      description: 對應 `eims.web.dto.table.ActionhisthsDto`。操作歷程。
      properties:
        hstDscd: { type: string, description: 歷程區分代碼 }
        itemId: { type: string, description: 項目 ID }
        workCttCd: { type: string, description: 作業內容代碼 }
        workDttm: { type: string, description: 作業時間 }
        userId: { type: string, description: 使用者 ID }
        itemDesc: { type: string, description: 項目說明 }
        intrfcType: { type: string, description: 介面類型 }
    DomainCORSDto:
      type: object
      description: |
        對應 `eims.web.dto.table.DomainCORSDto`。CORS 網域設定。無對應 endpoint，僅供未來批次 `$ref`。
        property 名採 setter `@JsonProperty` 別名（反序列化用）；序列化輸出採欄位原名。
      properties:
        tenantId: { type: string, description: 來源欄位 sysCd }
        domainId: { type: string }
        originValue: { type: string, description: 來源欄位 originDomainNm }
        originHeader: { type: string, description: 來源欄位 originHeaderContent }
        originMethod: { type: string, description: 來源欄位 originMethodId }
        createUserId: { type: string }
        createAppId: { type: string }
        createDt: { type: string, format: date-time }
        updateUserId: { type: string }
        updateAppId: { type: string }
        updateDt: { type: string, format: date-time }
    DomainSSLDto:
      type: object
      description: |
        對應 `eims.web.dto.table.DomainSSLDto`。SSL 網域設定。無對應 endpoint，僅供未來批次 `$ref`。
        property 名採 setter `@JsonProperty` 別名（反序列化用）；序列化輸出採欄位原名。
      properties:
        tenantId: { type: string, description: 來源欄位 sysCd }
        domainId: { type: string }
        resourcePath: { type: string, description: 來源欄位 resourcePathUrlAdr }
        pwd: { type: string, format: password, description: 來源欄位 sslPassword }
        sslContent: { type: string, format: byte, description: "SSL 內容（byte[]）" }
        createUserId: { type: string }
        createAppId: { type: string }
        createDt: { type: string, format: date-time }
        updateUserId: { type: string }
        updateAppId: { type: string }
        updateDt: { type: string, format: date-time }

    # ========================================================================
    # data 批次：dto.ui
    # ========================================================================
    UiCommCodeOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiCommCodeOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        commCodeDtoList:
          type: array
          items: { $ref: "#/components/schemas/CommCodeDto" }
    UiEncOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiEncOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        encOutList:
          type: array
          items: { $ref: "#/components/schemas/EnccdDto" }
    UiMaskOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiMaskOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        maskOutList:
          type: array
          items: { $ref: "#/components/schemas/MaskcdDto" }
    UiTrxcdOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiTrxcdOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        trxcdOutList:
          type: array
          items: { $ref: "#/components/schemas/TrxcdDto" }
    UiSrsysbsOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiSrsysbsOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        srsysbsOutList:
