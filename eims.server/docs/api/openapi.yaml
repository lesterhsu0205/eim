openapi: 3.0.3
info:
  title: EIMS Server REST API
  version: "1.0.0"
  description: |
    自 `eims.web.controller` 套件中所有 `@RequestMapping` / `@GetMapping` /
    `@PostMapping` / `@PutMapping` / `@DeleteMapping` 註解掃描而得之 REST API 規格。

    認證：除 `x-interceptor-excluded: true` 之 operation 外，皆需先通過 CAS SSO 與
    `RequestInterceptor`（見 `eims.config.CommonConfiguration`）。

    反序列化：全域 `CustomObjectMapper` 啟用 `FAIL_ON_UNKNOWN_PROPERTIES = true`，
    呼叫端必須只送 DTO 已宣告之欄位。

servers:
  - url: http://localhost:9100/eims
    description: 本機 Tomcat 開發環境（context path `/eims`、port `9100`）。
  - url: https://{host}/eims
    description: WAS 部署環境（JNDI `java:/EIMSNXA`）。
    variables:
      host:
        default: eims.example.com

tags:
  - name: Main
    description: 登入、登出、SSO、使用者資訊、語系切換。
  - name: Menu
    description: 選單 CRUD。
  - name: Role
    description: 角色 CRUD 與 menu/perm 關聯。
  - name: Perm
    description: 權限 CRUD。
  - name: User
    description: 使用者 CRUD。
  - name: App
    description: 應用程式 CRUD。
  - name: Biz
    description: 業務代碼 CRUD。
  - name: CommCode
    description: 共用代碼 CRUD 與查詢。
  - name: Enc
    description: 加密代碼。
  - name: Mask
    description: 遮罩代碼。
  - name: Trx
    description: 交易 CRUD。
  - name: Srsys
    description: 來源系統 CRUD。
  - name: Depolysys
    description: 部署系統 CRUD 與條件查詢。
  - name: Extrnlinst
    description: 外部機構 CRUD。
  - name: Mappingfunc
    description: Mapping 函式 CRUD。
  - name: Meta
    description: Meta CRUD、影響分析、同步。
  - name: Msglayout
    description: 訊息版面 CRUD、暫存、Excel 匯出、檔案上傳、外部訊息、msgId 產生。
  - name: Intrfccom
    description: 介面 CRUD、部署 / 重新部署 / 部署歷程、檔案上傳 / 匯入 / 匯出、layoutdiff、terminal、intrfcId 產生。
  - name: Actionhist
    description: 操作歷程查詢與新增。

components:
  securitySchemes:
    casSso:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: |
        CAS Single Sign-On。實作於 `eims.config.SSOFilterConfig`，由 `cas-client-core`
        與 `cas-client-support-saml` 提供（`lib/` 內離線 JAR）。Session 以 JSESSIONID
        cookie 維持。標註 `x-interceptor-excluded: true` 之 operation 不走
        `RequestInterceptor`，但可能仍受 SSO Filter 覆蓋——依 `CommonConfiguration`
        excludePathPatterns 為準。

  schemas:
    ErrorResponse:
      type: object
      description: 對應 `eims.web.dto.ui.ErrorResponse`。
      properties:
        responseStatus:
          type: string
        message:
          type: string
        parameters:
          type: array
          items: { type: string }
        stackTrace:
          type: string
    CommonResponse:
      type: object
      description: 對應 `eims.web.dto.CommonResponse`。一般成功/失敗回應；與 `ErrorResponse` 結構不同。
      properties:
        hasError:
          type: boolean
        errorMsg:
          type: string
    Generic:
      type: object
      description: |
        泛型佔位 schema。本批次（main-auth）涵蓋之 DTO 已展開；尚未展開之 endpoint
        後續 `flesh-out-schemas-data` / `flesh-out-schemas-intrfc` change 補完。
      additionalProperties: true

    # ========================================================================
    # main-auth 批次：共用 dto
    # ========================================================================
    SessionInfo:
      type: object
      description: 對應 `eims.web.dto.SessionInfo`。
      properties:
        userId: { type: string }
        userPassword: { type: string, format: password }
        locale: { type: string }
        check:
          type: string
          description: 預設 `Y`。
    UserInfo:
      type: object
      description: 對應 `eims.web.dto.UserInfo`。
      properties:
        userId: { type: string }
        roleId: { type: string }
        locale: { type: string }
        type: { type: string }
    LoginUserInfo:
      type: object
      description: 對應 `eims.web.dto.LoginUserInfo`。包含 session、user、perm、menu 樹。
      properties:
        sessionInfo:
          $ref: "#/components/schemas/SessionInfo"
        userDto:
          $ref: "#/components/schemas/UserDto"
        permList:
          type: array
          items: { $ref: "#/components/schemas/PermDto" }
        menuList:
          type: array
          items: { $ref: "#/components/schemas/UiMenuTreeInfo" }

    # ========================================================================
    # main-auth 批次：dto.table
    # ========================================================================
    MenuDto:
      type: object
      description: 對應 `eims.web.dto.table.MenuDto`。Jackson `NON_ABSENT` + `NON_EMPTY` + `ignoreUnknown=true`。
      properties:
        menuId: { type: string, description: 選單 ID }
        menuNm: { type: string, description: 選單名稱 }
        menuDesc: { type: string, description: 選單說明 }
        menuSeq: { type: integer, format: int32, description: 順序 }
        parentMenuId: { type: string, description: 上層選單 ID }
    RoleDto:
      type: object
      description: 對應 `eims.web.dto.table.RoleDto`。
      properties:
        roleId: { type: string, description: 角色 ID }
        roleNm: { type: string, description: 角色名稱 }
        roleDesc: { type: string, description: 角色說明 }
        basicMenuId: { type: string, description: 預設選單 ID }
    PermDto:
      type: object
      description: 對應 `eims.web.dto.table.PermDto`。
      properties:
        permId: { type: string, description: 權限 ID }
        permNm: { type: string, description: 權限名稱 }
        permDesc: { type: string, description: 權限說明 }
        permTypeCd: { type: string, description: 權限類別代碼 }
        check: { type: boolean, description: 勾選狀態（popup 用） }
    UserDto:
      type: object
      description: 對應 `eims.web.dto.table.UserDto`。
      properties:
        userId: { type: string, description: 使用者 ID }
        userNm: { type: string, description: 使用者名稱 }
        userPwd: { type: string, format: password, description: 使用者密碼 }
        dutyNm: { type: string, description: 職稱 }
        deptNm: { type: string, description: 部門 }
        email: { type: string, format: email }
        roleId: { type: string, description: 角色 ID }
    AppcdDto:
      type: object
      description: 對應 `eims.web.dto.table.AppcdDto`。
      properties:
        appCd: { type: string }
        appCdNm: { type: string }
        parentAppCd: { type: string }
        lvCd: { type: string }
        alignOrderNo: { type: integer, format: int32 }
        appCdDesc: { type: string }
        appUnqKey: { type: string }
    BizcdDto:
      type: object
      description: 對應 `eims.web.dto.table.BizcdDto`。
      properties:
        bizCd: { type: string }
        bizCdNm: { type: string }
        bizCdDesc: { type: string }
    MenuRoleRelDto:
      type: object
      description: 對應 `eims.web.dto.table.MenuRoleRelDto`。
      properties:
        menuId: { type: string }
        roleId: { type: string }
        permId: { type: string }
    RolePermRelDto:
      type: object
      description: 對應 `eims.web.dto.table.RolePermRelDto`。
      properties:
        roleId: { type: string }
        permId: { type: string }
    ChangePwdInfo:
      type: object
      description: 對應 `eims.web.dto.table.ChangePwdInfo`。`sysCd` 序列化為 `tenantId`。
      properties:
        tenantId:
          type: string
          description: 序列化來源 `sysCd`（透過 `@JsonProperty("tenantId")`）。
        userId: { type: string }
        userPwd: { type: string, format: password }
        changePwd: { type: string, format: password }
        updateUserId: { type: string }
        updateAppId: { type: string }

    # ========================================================================
    # main-auth 批次：dto.ui
    # ========================================================================
    UiMenuOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiMenuOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        menuOutList:
          type: array
          items: { $ref: "#/components/schemas/MenuDto" }
    UiMenuTreeInfo:
      type: object
      description: 對應 `eims.web.dto.ui.UiMenuTreeInfo`。樹狀結構節點，由 controller 端組裝。
      properties:
        id: { type: string }
        parentId: { type: string }
        name: { type: string }
        seq: { type: integer, format: int32 }
        description: { type: string }
        check: { type: boolean }
        permId: { type: string }
    UiRoleOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiRoleOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        roleDtoList:
          type: array
          items: { $ref: "#/components/schemas/RoleDto" }
    UiPermOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiPermOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        permDtoList:
          type: array
          items: { $ref: "#/components/schemas/PermDto" }
    UiUserOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiUserOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        userOutList:
          type: array
          items: { $ref: "#/components/schemas/UserDto" }
    UiAppcdOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiAppcdOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        appcdOutList:
          type: array
          items: { $ref: "#/components/schemas/AppcdDto" }
    UiBizcdOut:
      type: object
      description: 對應 `eims.web.dto.ui.UiBizcdOut`。
      properties:
        totalCnt: { type: integer, format: int32 }
        bizcdOutList:
          type: array
          items: { $ref: "#/components/schemas/BizcdDto" }

  responses:
    BadRequest:
      description: 請求格式或欄位錯誤。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未通過 CAS SSO 或 session 過期。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: 內部錯誤。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

security:
  - casSso: []

paths:
  # =========================================================================
  # Main
  # =========================================================================
  /login:
    post:
      tags: [Main]
      operationId: login
      summary: 一般帳密登入。
      x-interceptor-excluded: true
      description: 排除於 `RequestInterceptor`（見 `CommonConfiguration.excludePathPatterns`）。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SessionInfo" }
      responses:
        "200":
          description: 登入結果，包含 session、user、perm list 與 menu tree。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginUserInfo" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/ServerError" }
  /eims/sso:
    get:
      tags: [Main]
      operationId: ssoEntry
      summary: CAS SSO 入口。
      responses:
        "200":
          description: 重新導向或 SSO ticket 驗證結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Generic" }
  /changelang:
    get:
      tags: [Main]
      operationId: changeLang
      summary: 切換使用者語系。
      parameters:
        - in: query
          name: lang
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Generic" }
  /logininfosso:
    get:
      tags: [Main]
      operationId: getLoginInfoSso
      summary: 取得 SSO 登入資訊。
      responses:
        "200":
          description: SSO 登入後使用者資訊。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginUserInfo" }
  /bxmlogin:
    get:
      tags: [Main]
      operationId: bxmLogin
      summary: BXM 登入入口。
      x-interceptor-excluded: true
      description: 排除於 `RequestInterceptor`。
      security: []
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Generic" }
  /userInfo:
    get:
      tags: [Main]
      operationId: getUserInfo
      summary: 取得目前登入使用者資訊。
      responses:
        "200":
          description: 使用者資訊。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserInfo" }
  /logout:
    post:
      tags: [Main]
      operationId: logout
      summary: 登出。
      x-interceptor-excluded: true
      description: 排除於 `RequestInterceptor`。
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonResponse" }

  # =========================================================================
  # Menu
  # =========================================================================
  /menus:
    get:
      tags: [Menu]
      operationId: listMenus
      summary: 取得選單清單。
      x-interceptor-excluded: true
      description: 排除於 `RequestInterceptor`。
      responses:
        "200":
          description: 選單清單。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UiMenuOut" }
    post:
      tags: [Menu]
      operationId: createMenu
      summary: 新增選單。
      x-interceptor-excluded: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MenuDto" }
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonResponse" }
    put:
      tags: [Menu]
      operationId: updateMenu
      summary: 修改選單。
      x-interceptor-excluded: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MenuDto" }
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonResponse" }
  /menus/{menuId}:
    parameters:
      - in: path
        name: menuId
        required: true
        schema: { type: string }
    get:
      tags: [Menu]
      operationId: getMenu
      summary: 取單筆選單。
      responses:
        "200":
          description: 選單。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MenuDto" }
    delete:
      tags: [Menu]
      operationId: deleteMenu
      summary: 刪除選單。
      responses:
        "200":
          description: 結果。
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommonResponse" }

  # =========================================================================
  # Role
  # =========================================================================
  /roles:
    get:
      tags: [Role]
      operationId: listRoles
      summary: 角色清單。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/UiRoleOut" } }
    post:
      tags: [Role]
      operationId: createRole
      summary: 新增角色。
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/RoleDto" } }
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
    put:
      tags: [Role]
      operationId: updateRole
      summary: 修改角色。
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/RoleDto" } }
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: getRole
      summary: 取單筆角色。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/RoleDto" } }
    delete:
      tags: [Role]
      operationId: deleteRole
      summary: 刪除角色。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}/menus:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: listRoleMenus
      summary: 角色對應之選單清單。
      responses:
        "200":
          description: 結果（menu tree）。
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UiMenuTreeInfo" }
    put:
      tags: [Role]
      operationId: updateRoleMenus
      summary: 設定角色之選單清單。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/MenuRoleRelDto" }
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}/menupopups:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: listRoleMenuPopups
      summary: popup 用之選單清單。
      responses:
        "200":
          description: 結果（menu tree popup 視圖）。
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UiMenuTreeInfo" }
  /roles/{roleId}/menus/{menuId}:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
      - in: path
        name: menuId
        required: true
        schema: { type: string }
    delete:
      tags: [Role]
      operationId: removeRoleMenu
      summary: 移除角色之單一選單。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}/perms:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: listRolePerms
      summary: 角色對應之權限清單。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/UiPermOut" } }
    put:
      tags: [Role]
      operationId: updateRolePerms
      summary: 設定角色之權限清單。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/RolePermRelDto" }
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }
  /roles/{roleId}/permpopups:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
    get:
      tags: [Role]
      operationId: listRolePermPopups
      summary: popup 用之權限清單。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/UiPermOut" } }
  /roles/{roleId}/perms/{permId}:
    parameters:
      - in: path
        name: roleId
        required: true
        schema: { type: string }
      - in: path
        name: permId
        required: true
        schema: { type: string }
    delete:
      tags: [Role]
      operationId: removeRolePerm
      summary: 移除角色之單一權限。
      responses:
        "200":
          description: 結果。
          content:
            application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } }

  # =========================================================================
  # Perm
  # =========================================================================
  /perms:
    get:
      tags: [Perm]
      operationId: listPerms
      summary: 權限清單。
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/UiPermOut" } } } }
    post:
      tags: [Perm]
      operationId: createPerm
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PermDto" } } } }
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } } } }
    put:
      tags: [Perm]
      operationId: updatePerm
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PermDto" } } } }
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } } } }
  /perms/{permId}:
    parameters: [{ in: path, name: permId, required: true, schema: { type: string } }]
    get:
      tags: [Perm]
      operationId: getPerm
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/PermDto" } } } }
    delete:
      tags: [Perm]
      operationId: deletePerm
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/CommonResponse" } } } }

  # =========================================================================
  # User
  # =========================================================================
  /users:
    get:
      tags: [User]
      operationId: listUsers
      responses:
        "200": { description: 結果。, content: { application/json: { schema: { $ref: "#/components/schemas/UiUserOut" } } } }
    post:
      tags: [User]
      operationId: createUser
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UserDto" } } } }
      responses:
