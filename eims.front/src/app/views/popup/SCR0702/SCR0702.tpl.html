<div class="dim" ng-style="{'z-index':vm.zIndex }">
	<div class="simple-modal-wrap" ng-style="{ 'top':vm.top+'px', 'left': vm.left+'px'}">
		<div ng-style="{ 'width':vm.width+'px'}"  id="trxDscd">
			<h2 class="bw-tt a-center">
				{{::vm.text.interfaceModalHeaer}}
				<button type="button" class="bw-btn bxd bxd-close" style="position:absolute;right:32px" ng-click="vm.closeModal(false)"></button>
			</h2>
			
			<bc-tool-wrap></bc-tool-wrap>
			
			<section class="search-wrap clr">
				<ul class="unit w-100 clr">
					<li class="w-50">
						<div class="input-wrap asterisk clr">
							<label class="bw-label wp-150">{{::vm.text.intrfcId}}</label>
							<input type="text" class="bw-input wc-150" ng-model="vm.intrfc.intrfcId" />
						</div>
					</li>
					<li class="w-50">
						<div class="input-wrap asterisk clr">
							<label class="bw-label wp-150">{{::vm.text.lvCds}}</label>
							<input type="text" class="bw-input wc-170" ng-model="vm.intrfc.lv1Cd" disabled>
							<i class="bxd bxd-search h-20" title="{{::vm.text.search}}" ng-click="vm.selectApplication()"></i>
						</div>
					</li>
				</ul>
				<ul class="unit w-100 clr">
					<li class="w-50">
						<div class="input-wrap asterisk clr">
							<label class="bw-label wp-150">{{::vm.text.sysCdS}}</label>
							<input type="text" class="bw-input wc-170"  ng-model="vm.sndSys.sysCd" disabled>
							<i class="bxd bxd-search h-20" title="{{::vm.text.search}}"  ng-click="vm.selectSndSys()"></i>
						</div>
					</li>
					<li class="w-50">
						<div class="input-wrap clr disabled">
							<label class="bw-label wp-150">{{::vm.text.sndSysNm}}</label>
							<input type="text" class="bw-input wc-150" ng-model="vm.sndSys.sysNm" disabled>
						</div>
					</li>
				</ul>
				<ul class="unit w-100 clr">
					<li class="w-50">
						<div class="input-wrap asterisk clr">
							<label class="bw-label wp-150">{{::vm.text.sysCdR}}</label>
							<input type="text" class="bw-input wc-170"  ng-model="vm.rcvSys.sysCd" disabled>
							<i class="bxd bxd-search h-20" title="{{::vm.text.search}}"  ng-click="vm.selectRcvSys()"></i>
						</div>
					</li>
					<li class="w-50">
						<div class="input-wrap clr disabled">
							<label class="bw-label wp-150">{{::vm.text.rcvSysNm}}</label>
							<input type="text" class="bw-input wc-150"  ng-model="vm.rcvSys.sysNm" disabled>
						</div>
					</li>
				</ul>
				
				<ul class="unit w-100 clr">
					<li class="w-50">
						<div class="input-wrap asterisk clr editable">
							<label class="bw-label wp-150">{{::vm.text.trxDscd2}}</label>
							<select class="bw-input ipt-select wc-150" 
								ng-options="item.cdVal as item.cdValNm for item in vm.tranDscdList"
								ng-model="vm.intrfc.trxDscd"
								ng-change="vm.chgTrxDscd(vm.intrfc.trxDscd)">
							</select>
						</div>
					</li>
				</ul>
			</section>
		</div>
		
		<div class="btn-wrap add-mg">
			<button type="button" class="bw-btn-txt" ng-click="vm.closeModal(true)">{{::vm.text.create}}</button>
			<button type="button" class="bw-btn-txt on" ng-click="vm.closeModal(false)">{{::vm.text.cancel}}</button>
		</div>
	</div>
</div>
